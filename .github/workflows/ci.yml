name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: my-runners
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Read service name
        id: meta
        run: echo "service=$(grep -A1 '^metadata:' score.yaml | grep 'name:' | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.service }}:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.service }}:latest

      - name: Deploy via Orchestrator
        run: |
          WORKLOAD="${{ steps.meta.outputs.service }}"
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.service }}:${{ github.sha }}"
          curl -X POST 'http://10.20.202.118:30080/orchestrator/api/v1/deploy' \
            -F 'org=platform-engineering' \
            -F 'env=dev' \
            -F "workload=${WORKLOAD}" \
            -F 'score=@score.yaml' \
            -F "image=${IMAGE}"
